<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ if .IsHome }}{{ .Site.Params.description }}{{ else }}{{ .Summary | plainify | truncate 160 }}{{ end }}">

    <!-- Spectral · DM Sans · Noto Serif SC -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Spectral:ital,wght@0,600;0,700;0,800;1,600;1,700;1,800&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
    <link rel="icon" type="image/png" href="{{ "favicon.png" | relURL }}">
</head>
<body{{ if or .IsHome (eq .Kind "section") }} class="feed-page"{{ end }}>
    <div class="reading-bar"><div class="reading-bar-fill" id="readingBar"></div></div>

    <header class="site-header" id="siteHeader">
        <nav class="nav-inner">
            <a href="{{ .Site.BaseURL }}" class="site-logo">
                <span class="logo-mark">ELN</span>
                <span class="logo-divider"></span>
                <span class="logo-text">English Learning Note</span>
            </a>
            <div class="nav-right">
                <button class="search-btn" id="searchBtn" aria-label="Search">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                </button>
                <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">
                    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>
        </nav>
    </header>

    <div class="search-overlay" id="searchOverlay" aria-hidden="true">
        <div class="search-panel">
            <div class="search-input-row">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" id="searchInput" placeholder="Search titles, tags, topics…" autocomplete="off" spellcheck="false">
                <button id="searchClose" aria-label="Close search">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="search-results" id="searchResults">
                <p class="search-hint-text">Start typing to search across every lesson.</p>
            </div>
        </div>
    </div>

    <main>
        {{ block "main" . }}{{ end }}
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-brand">
                <div class="footer-logo">English Learning <em>Note</em></div>
                <p class="footer-tagline">One lesson at a time. Scroll, tap in, immerse.</p>
            </div>
            <div class="footer-copy">
                <p>© {{ now.Format "2006" }} English Learning Note</p>
                <p class="footer-note">Built for learners 📚</p>
            </div>
        </div>
    </footer>

    <script>
    // ── Theme toggle (dark default) ──────────────────────
    const btn = document.getElementById('themeBtn');
    const html = document.documentElement;
    const saved = localStorage.getItem('theme') ||
        (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'dark');
    html.setAttribute('data-theme', saved);
    btn.addEventListener('click', () => {
        const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
    });

    // ── Scrolled header shadow ───────────────────────────
    const header = document.getElementById('siteHeader');
    window.addEventListener('scroll', () => {
        header.classList.toggle('scrolled', window.scrollY > 20);
    }, { passive: true });

    // ── Reading progress (bar + sidebar fill) ────────────
    const bar = document.getElementById('readingBar');
    const fill = document.getElementById('progressFill');
    const pctLabel = document.getElementById('progressPct');

    window.addEventListener('scroll', () => {
        const body = document.querySelector('.post-body');
        if (!body) return;
        const rect = body.getBoundingClientRect();
        const scrolled = Math.max(0, -rect.top);
        const pct = Math.min(100, Math.round((scrolled / body.offsetHeight) * 100));
        const w = pct + '%';
        if (bar) bar.style.width = w;
        if (fill) fill.style.width = w;
        if (pctLabel) pctLabel.textContent = pct + '%';
    }, { passive: true });

    // ── Search ────────────────────────────────────────────
    (function(){
        const searchBtn = document.getElementById('searchBtn');
        const overlay = document.getElementById('searchOverlay');
        const input = document.getElementById('searchInput');
        const results = document.getElementById('searchResults');
        const closeBtn = document.getElementById('searchClose');
        if (!searchBtn || !overlay) return;

        let index = null;
        let indexPromise = null;

        function loadIndex(){
            if (!indexPromise) {
                indexPromise = fetch('{{ "index.json" | relURL }}')
                    .then(r => r.json())
                    .then(data => { index = data; return data; })
                    .catch(() => { index = []; return []; });
            }
            return indexPromise;
        }

        function openSearch(){
            overlay.classList.add('open');
            overlay.setAttribute('aria-hidden', 'false');
            document.body.classList.add('search-lock');
            loadIndex();
            setTimeout(() => input.focus(), 50);
        }
        function closeSearch(){
            overlay.classList.remove('open');
            overlay.setAttribute('aria-hidden', 'true');
            document.body.classList.remove('search-lock');
        }

        searchBtn.addEventListener('click', openSearch);
        closeBtn.addEventListener('click', closeSearch);
        overlay.addEventListener('click', (e) => { if (e.target === overlay) closeSearch(); });
        document.addEventListener('keydown', (e) => {
            if ((e.key === '/' || (e.key.toLowerCase() === 'k' && (e.metaKey || e.ctrlKey))) &&
                document.activeElement.tagName !== 'INPUT' && !overlay.classList.contains('open')) {
                e.preventDefault(); openSearch();
            } else if (e.key === 'Escape' && overlay.classList.contains('open')) {
                closeSearch();
            }
        });

        function render(items, query){
            if (!query) {
                results.innerHTML = '<p class="search-hint-text">Start typing to search across every lesson.</p>';
                return;
            }
            if (items.length === 0) {
                results.innerHTML = '<p class="search-hint-text">No lessons match “' + query.replace(/</g,'&lt;') + '”.</p>';
                return;
            }
            results.innerHTML = items.slice(0, 40).map(p => {
                const tags = (p.tags || []).slice(0, 4).map(t => '<span class="tag">' + t + '</span>').join('');
                const section = p.section === 'bbc-english' ? 'BBC Learning English' : p.section;
                return '<a class="search-result" href="' + p.url + '">' +
                    '<div class="search-result-top"><span class="search-result-section">' + section + '</span>' +
                    (p.date ? '<time>' + p.date + '</time>' : '') + '</div>' +
                    '<div class="search-result-title">' + p.title + '</div>' +
                    (p.summary_zh ? '<div class="search-result-zh">' + p.summary_zh + '</div>' : '') +
                    (tags ? '<div class="search-result-tags">' + tags + '</div>' : '') +
                    '</a>';
            }).join('');
        }

        let debounceTimer;
        input.addEventListener('input', () => {
            clearTimeout(debounceTimer);
            debounceTimer = setTimeout(async () => {
                const q = input.value.trim().toLowerCase();
                if (!q) { render([], ''); return; }
                const data = await loadIndex();
                const matches = data.filter(p => {
                    const haystack = [p.title, p.topic, p.summary_zh, p.section, (p.tags || []).join(' ')]
                        .join(' ').toLowerCase();
                    return haystack.includes(q);
                });
                render(matches, q);
            }, 120);
        });
    })();
    </script>
</body>
</html>
