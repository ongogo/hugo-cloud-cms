<!DOCTYPE html>
<html lang="{{ .Site.LanguageCode }}" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ if .IsHome }}{{ .Site.Title }}{{ else }}{{ .Title }} | {{ .Site.Title }}{{ end }}</title>
    <meta name="description" content="{{ if .IsHome }}{{ .Site.Params.description }}{{ else }}{{ .Summary | plainify | truncate 160 }}{{ end }}">

    <!-- Fraunces · Plus Jakarta Sans · Noto Serif SC -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,700;0,9..144,900;1,9..144,400;1,9..144,700;1,9..144,900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="{{ "css/style.css" | relURL }}">
</head>
<body>
    <div class="reading-bar"><div class="reading-bar-fill" id="readingBar"></div></div>

    <header class="site-header" id="siteHeader">
        <nav class="nav-inner">
            <a href="{{ .Site.BaseURL }}" class="site-logo">
                <span class="logo-mark">SCMP</span>
                <span class="logo-divider"></span>
                <span class="logo-text">English Learning</span>
            </a>
            <div class="nav-center">
                <span class="nav-tagline">Real news · Real English · For Chinese learners</span>
            </div>
            <div class="nav-right">
                <a href="{{ .Site.BaseURL }}posts/" class="nav-link">All Articles</a>
                <button class="theme-btn" id="themeBtn" aria-label="Toggle theme">
                    <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                    <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                </button>
            </div>
        </nav>
    </header>

    <main>
        {{ block "main" . }}{{ end }}
    </main>

    <footer class="site-footer">
        <div class="footer-inner">
            <div class="footer-brand">
                <span class="footer-logo">SCMP <em>English</em></span>
                <p class="footer-tagline">Real journalism. Real vocabulary. Real progress.</p>
            </div>
            <nav class="footer-nav">
                <a href="{{ .Site.BaseURL }}">Home</a>
                <a href="{{ .Site.BaseURL }}posts/">All Articles</a>
            </nav>
            <div class="footer-copy">
                <p>© {{ now.Format "2006" }} SCMP English Learning</p>
                <p class="footer-note">Built for learners 📚</p>
            </div>
        </div>
    </footer>

    <script>
    // Theme toggle
    const btn = document.getElementById('themeBtn');
    const html = document.documentElement;
    const saved = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
    html.setAttribute('data-theme', saved);
    btn.addEventListener('click', () => {
        const next = html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
        html.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
    });

    // Scrolled header
    const header = document.getElementById('siteHeader');
    window.addEventListener('scroll', () => {
        header.classList.toggle('scrolled', window.scrollY > 20);
    }, { passive: true });

    // Reading progress bar
    const bar = document.getElementById('readingBar');
    if (bar) {
        window.addEventListener('scroll', () => {
            const body = document.querySelector('.post-body');
            if (!body) return;
            const rect = body.getBoundingClientRect();
            const scrolled = Math.max(0, -rect.top);
            const pct = Math.min(100, (scrolled / body.offsetHeight) * 100);
            bar.style.width = pct + '%';
        }, { passive: true });
    }
    </script>
</body>
</html>
